defaults:
- env/libero_object@env.train
- env/libero_object@env.eval
- model/pi0_5@actor.model
- training_backend/fsdp@actor.fsdp_config
- override hydra/job_logging: stdout
hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
  - file://${oc.env:EMBODIED_PATH}/config/
cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-1
runner:
  task_type: embodied
  logger:
    log_path: ../results
    project_name: rlinf
    experiment_name: libero_object_grpo_openpi_pi05_50h_eval30_base
    logger_backends:
    - tensorboard
  max_epochs: 1000
  max_steps: -1
  only_eval: false
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null
algorithm:
  normalize_advantages: true
  kl_penalty: kl
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 8
  eval_rollout_epoch: 50
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1
  adv_type: grpo
  loss_type: actor
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: true
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: false
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1
env:
  group_name: EnvGroup
  enable_offload: false
  train:
    total_num_envs: 64
    group_size: ${algorithm.group_size}
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
  eval:
    total_num_envs: 10
    auto_reset: true
    ignore_terminations: true
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    use_fixed_reset_state_ids: true
    is_eval: true
    video_cfg:
      save_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval
rollout:
  group_name: RolloutGroup
  generation_backend: huggingface
  recompute_logprobs: false
  unnorm_key: libero_10
  enable_offload: false
  pipeline_stage_num: 2
  model:
    model_path: ${oc.env:REPO_PATH}/models/pi05_pytorch
    precision: ${actor.model.precision}
actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 128
  global_batch_size: 2048
  seed: 42
  enable_offload: false
  model:
    model_path: ${oc.env:REPO_PATH}/models/pi05_pytorch
    model_type: openpi
    num_action_chunks: 30
    num_steps: 10
    openpi:
      action_horizon: 50
      eval_action_horizon: 30
      enable_speculative: false
      spec_batch_size: 8
      spec_action_horizon: 50
      spec_diffusion_num_steps: 10
      spec_conf_alpha: 0.8
      spec_conf_eps: 1.0e-08
      spec_delta_thresholds:
      - 0.2
      - 0.2
      - 0.3
      - 0.1
      - 0.1
      - 0.1
      spec_debug: true
  optim:
    lr: 5.0e-06
    value_lr: 0.0001
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: false
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
reward:
  use_reward_model: false
critic:
  use_critic_model: false
